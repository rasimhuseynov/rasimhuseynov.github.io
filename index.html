<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rasim Huseynov — CS Student & Future Tech Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background:#0A0F1E; color:#E8F4FD; font-family:'Inter',sans-serif; }
    #intro-splash {
      position: fixed; inset: 0; z-index: 999999;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #160a26 0%, #07040d 60%, #020103 100%);
      transition: opacity 1s ease, visibility 1s ease;
    }
    #intro-splash.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
    #heartCanvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    #sen-text {
      position: relative; z-index: 2;
      font-family: 'Space Grotesk', sans-serif; font-weight: 700;
      font-size: clamp(2.6rem, 9vw, 6.5rem);
      color: #ff1f4b; opacity: 0; pointer-events: none;
      text-shadow: 0 0 18px rgba(255,31,75,.85), 0 0 42px rgba(255,31,75,.55), 0 0 80px rgba(255,31,75,.3);
      transition: opacity 1.1s ease;
    }
    #sen-text.show { opacity: 1; animation: senPulse 1.6s ease-in-out infinite; }
    @keyframes senPulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    #skip-intro {
      position: absolute; bottom: 2.25rem; right: 2.25rem; z-index: 3;
      padding: .6rem 1.4rem; border-radius: 999px;
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.04); backdrop-filter: blur(6px);
      color: #E8F4FD; font-family: 'Space Grotesk', sans-serif;
      font-size: .78rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
      cursor: pointer; transition: border-color .2s, color .2s, transform .2s;
    }
    #skip-intro:hover { border-color: #ff1f4b; color: #ff1f4b; transform: translateY(-2px); }
    .intro-hint {
      position: absolute; bottom: 2.4rem; left: 50%; transform: translateX(-50%); z-index: 3;
      font-family: 'Space Mono', monospace; font-size: .7rem; letter-spacing: .18em; text-transform: uppercase;
      color: rgba(232,244,253,.35); opacity: 0; transition: opacity 1s ease;
    }
    .intro-hint.show { opacity: 1; }
    body.intro-active { overflow: hidden; height: 100vh; }
    @media (prefers-reduced-motion: reduce) { #sen-text.show { animation: none; } }
  </style>
</head>
<body class="intro-active">

  <div id="intro-splash">
    <canvas id="heartCanvas"></canvas>
    <div id="sen-text">RASIM</div>
    <div class="intro-hint" id="introHint">move your mouse · click to continue</div>
    <button id="skip-intro" type="button">Skip ▸</button>
  </div>

  <div id="portfolio-content">
    <!-- rest of your existing portfolio markup stays exactly as-is -->
  </div>

  <script>
    /* ════════════════════════════════════════════════════════════
       INTRO SPLASH — CANVAS PARTICLE HEART
       - Particles fly in from the edges and settle into a heart.
       - Once mostly settled, "RASIM" pulses at the center.
       - NEW: particles repel from the mouse cursor and smoothly
         spring back to their heart position when the cursor moves
         away.
       - NEW: no auto-skip timer — the user controls when to leave
         via the Skip button, click, or a key press.
    ════════════════════════════════════════════════════════════ */
    (function () {
      if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
      window.scrollTo(0, 0);

      const splash  = document.getElementById('intro-splash');
      const canvas  = document.getElementById('heartCanvas');
      const ctx     = canvas.getContext('2d');
      const senText = document.getElementById('sen-text');
      const skipBtn = document.getElementById('skip-intro');
      const hint    = document.getElementById('introHint');

      let W, H, DPR;
      function resize() {
        DPR = Math.min(window.devicePixelRatio || 1, 2);
        W = canvas.width  = Math.floor(window.innerWidth  * DPR);
        H = canvas.height = Math.floor(window.innerHeight * DPR);
        canvas.style.width  = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
      }
      resize();
      window.addEventListener('resize', () => { resize(); particles = buildParticles(); });

      const LABEL = 'RASKA';

      const area = window.innerWidth * window.innerHeight;
      const PARTICLE_COUNT = Math.max(400, Math.min(1200, Math.round(area / 1300)));

      function heartCurve(t) {
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        return { x, y };
      }

      function buildParticles() {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2 - window.innerHeight * 0.03;
        const baseScale = Math.min(window.innerWidth, window.innerHeight) / 34;

        const list = [];
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const t = Math.random() * Math.PI * 2;
          const fill = Math.sqrt(Math.random());
          const pt = heartCurve(t);

          const targetX = cx + pt.x * fill * baseScale;
          const targetY = cy - pt.y * fill * baseScale;

          const edge = Math.floor(Math.random() * 4);
          let startX, startY;
          const pad = 80;
          if (edge === 0)      { startX = -pad; startY = Math.random() * window.innerHeight; }
          else if (edge === 1) { startX = window.innerWidth + pad; startY = Math.random() * window.innerHeight; }
          else if (edge === 2) { startX = Math.random() * window.innerWidth; startY = -pad; }
          else                 { startX = Math.random() * window.innerWidth; startY = window.innerHeight + pad; }

          const size = 7 + Math.random() * 6;
          const sizeBucket = Math.round(size);
          const hue = 340 + Math.random() * 25;
          const baseAlpha = 0.55 + Math.random() * 0.45;

          list.push({
            x: startX, y: startY,
            startX, startY,
            targetX, targetY,
            // current "home" position the particle springs back to once the
            // intro entrance has finished — same as targetX/Y but kept
            // separate so the entrance animation logic doesn't need to change.
            homeX: targetX, homeY: targetY,
            // mouse-repel offset, applied on top of the eased entrance position
            offX: 0, offY: 0,
            delay: Math.random() * 900,
            duration: 1100 + Math.random() * 700,
            sizeBucket,
            color: function (mult) {
              const a = (baseAlpha * mult).toFixed(2);
              return 'hsla(' + hue + ', 90%, 62%, ' + a + ')';
            },
            settled: false
          });
        }
        return list;
      }

      let particles = buildParticles();

      function easeOutCubic(p) { return 1 - Math.pow(1 - p, 3); }

      /* ── Mouse tracking for the repel effect ── */
      const mouse = { x: -9999, y: -9999, active: false };
      const REPEL_RADIUS = 130;     // px within which particles flee
      const REPEL_STRENGTH = 55;    // max push distance at the cursor center
      const SPRING = 0.12;          // how quickly offset eases toward target push
      const RETURN_SPRING = 0.10;   // how quickly offset eases back to 0 when idle

      function updatePointer(clientX, clientY) {
        mouse.x = clientX;
        mouse.y = clientY;
        mouse.active = true;
      }
      canvas.addEventListener('mousemove', (e) => updatePointer(e.clientX, e.clientY));
      canvas.addEventListener('mouseleave', () => { mouse.active = false; });
      canvas.addEventListener('touchmove', (e) => {
        if (e.touches && e.touches[0]) updatePointer(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: true });
      canvas.addEventListener('touchend', () => { mouse.active = false; });

      let startTime = null;
      let allSettled = false;
      let senShown = false;
      let rafId = null;

      function draw(now) {
        if (startTime === null) startTime = now;
        const elapsed = now - startTime;

        ctx.save();
        ctx.scale(DPR, DPR);
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

        let settledCount = 0;

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowBlur = 0;

        let currentSizeKey = null;

        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          const localT = elapsed - p.delay;
          let progress = localT <= 0 ? 0 : Math.min(1, localT / p.duration);
          const eased = easeOutCubic(progress);

          // Base entrance position (unaffected by the mouse)
          const baseX = p.startX + (p.homeX - p.startX) * eased;
          const baseY = p.startY + (p.homeY - p.startY) * eased;

          if (progress >= 1) { p.settled = true; settledCount++; }

          // ── Mouse repel: compute desired offset, then spring toward it ──
          let desiredOffX = 0;
          let desiredOffY = 0;

          if (mouse.active) {
            const dx = baseX - mouse.x;
            const dy = baseY - mouse.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < REPEL_RADIUS && dist > 0.001) {
              const falloff = 1 - dist / REPEL_RADIUS; // 1 at cursor, 0 at edge
              const push = falloff * falloff * REPEL_STRENGTH;
              desiredOffX = (dx / dist) * push;
              desiredOffY = (dy / dist) * push;
            }
          }

          // Spring the current offset toward the desired offset — fast when
          // fleeing, slightly slower (but still snappy) when returning home.
          const k = (desiredOffX === 0 && desiredOffY === 0) ? RETURN_SPRING : SPRING;
          p.offX += (desiredOffX - p.offX) * k;
          p.offY += (desiredOffY - p.offY) * k;

          // Snap tiny residual offsets to exactly 0 so particles fully
          // settle back into the heart shape instead of drifting forever.
          if (Math.abs(p.offX) < 0.05) p.offX = 0;
          if (Math.abs(p.offY) < 0.05) p.offY = 0;

          p.x = baseX + p.offX;
          p.y = baseY + p.offY;

          const sizeKey = p.sizeBucket;
          if (sizeKey !== currentSizeKey) {
            ctx.font = '600 ' + sizeKey + 'px "Space Grotesk", sans-serif';
            currentSizeKey = sizeKey;
          }

          ctx.fillStyle = p.color(Math.max(progress, 0.15));
          ctx.fillText(LABEL, p.x, p.y);
        }

        ctx.restore();

        if (!allSettled && settledCount === particles.length) {
          allSettled = true;
        }

        if (allSettled && !senShown) {
          senShown = true;
          senText.classList.add('show');
          setTimeout(() => hint.classList.add('show'), 600);
        }

        rafId = requestAnimationFrame(draw);
      }
      rafId = requestAnimationFrame(draw);

      function endIntro() {
        if (rafId) cancelAnimationFrame(rafId);
        window.scrollTo(0, 0);
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
        splash.classList.add('fade-out');
        document.body.classList.remove('intro-active');
        window.scrollTo(0, 0);
        setTimeout(() => { splash.style.display = 'none'; window.scrollTo(0, 0); }, 1050);
      }

      // NOTE: no auto-advance timer — the intro now stays on screen until
      // the user explicitly leaves via Skip, a click, or a key press.
      function userSkip() {
        endIntro();
      }

      skipBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        userSkip();
      });
      splash.addEventListener('click', (e) => {
        if (e.target === skipBtn) return;
        userSkip();
      });
      document.addEventListener('keydown', (e) => {
        if (splash.style.display !== 'none' && (e.key === 'Enter' || e.key === ' ' || e.key === 'Escape')) {
          userSkip();
        }
      });
    })();
  </script>

</body>
</html>
